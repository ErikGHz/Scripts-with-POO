services:
  app-db:
    image: mariadb:10.5.5
    container_name: app-db
    restart: unless-stopped
    env_file: .env-db
    expose:
      - 3306
    ports:
      - 3306:3306
    volumes:
      - ./MariaDB:/var/lib/mysql

  wp-db:
    image: mariadb:10.5.5
    container_name: wp-db
    restart: unless-stopped
    expose:
      - 3306
    env_file: .env-wp-db
    volumes:
      - ./App/WpManager/wordpress/MariaDB:/var/lib/mysql

  app:
    container_name: app
    build: .
    env_file: .env
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./App:/home/worker/App
      - static_app:/static
    expose:
      - 8000
    depends_on:
      - app-db
    links:
      - app-db

  app-nginx:
    image: nginx:1.15.12-alpine
    container_name: app-nginx
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${APP_NAME}
      # - LETSENCRYPT_HOST=${APP_NAME}
      # - LETSENCRYPT_EMAIL=37184804@uaz.edu.mx
    volumes:
      - ./config/nginx/conf.d:/etc/nginx/conf.d
      - static_app:/static
    depends_on:
      - app
    links:
      - app
    expose:
      - 80

  redis:
    image: redis:alpine
    ports:
      - 6379:6379

  celery:
    build: .
    env_file: .env-celery
    user: worker
    command: ["celery", "-A", "App", "worker", "--loglevel=info"]
    volumes:
      - ./App:/home/worker/App
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - app-db
      - wp-db
      - selenium

  celerybeat:
    build: .
    env_file: .env-celery
    user: worker
    command: ["celery", "-A", "App", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    volumes:
      - ./App:/home/worker/App
    depends_on:
      - redis
      - app-db

  selenium:
    image: selenium/standalone-chrome
    container_name: selenium
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - VNC_NO_PASSWORD=1
    ports:
      - "4444:4444"

networks:
  default:
    external: true
    name: webproxy

volumes:
  static_app: